<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Avaliação de Desempenho · Contabilizare</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,800&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
:root{
  /* Paleta da marca Contabilizare: branco, cinza claro, azul-marinho e dourado */
  --bg:#F1F2F5; --sup:#FFFFFF; --sup2:#F7F8FA;
  --tinta:#0D153E; --tinta2:#5C6178; --tinta3:#95989A;
  --linha:#DCDFE6; --linha2:#EBEDF2;
  --marinho:#0D153E; --marinho-esc:#070C26; --marinho-cl:#E7EAF3; --marinho-md:#2A3468;
  --dourado:#C9A227; --dourado-esc:#8F7218; --vermelho:#A8352A; --cinza:#95989A;
  --c1:#A8352A; --c2:#B4762A; --c3:#5B6C99; --c4:#0D153E; --c5:#9A7B14;
  --r:10px; --sombra:0 1px 2px rgba(13,21,62,.06), 0 8px 24px rgba(13,21,62,.06);
  --disp:'Bricolage Grotesque', system-ui, sans-serif;
  --corpo:'Inter', system-ui, sans-serif;
  --mono:'IBM Plex Mono', ui-monospace, monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--tinta);font-family:var(--corpo);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
button,input,select,textarea{font-family:inherit;font-size:inherit;color:inherit}
button{cursor:pointer;border:0;background:none}
a{color:var(--marinho)}
:focus-visible{outline:2px solid var(--marinho);outline-offset:2px}
@media (prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}

/* ---------- Login ---------- */
#login{min-height:100vh;display:grid;place-items:center;padding:24px;
  background:radial-gradient(125% 95% at 18% 0%, #1B2559 0%, #0D153E 55%, #060A22 100%)}
#login::after{content:'';position:fixed;left:0;right:0;bottom:0;height:4px;
  background:linear-gradient(90deg,var(--dourado) 0%, #E3C766 50%, var(--dourado) 100%)}
.cardLogin{width:100%;max-width:400px;background:var(--sup);border-radius:16px;padding:34px;box-shadow:0 30px 80px rgba(0,0,0,.4)}
.logoLogin{width:230px;height:auto;display:block;margin-bottom:22px}
.logoTopo{height:26px;width:auto;display:block}
.cardLogin h1{font-family:var(--disp);font-weight:800;font-size:29px;line-height:1.1;margin:0 0 4px;letter-spacing:-.02em;color:var(--marinho)}
.cardLogin h1 span{color:var(--dourado)}
.cardLogin p.sub{color:var(--tinta2);font-size:13px;margin-bottom:22px}
label{display:block;font-size:12px;font-weight:600;color:var(--tinta2);margin:12px 0 5px;letter-spacing:.02em}
input,select,textarea{width:100%;padding:10px 12px;border:1px solid var(--linha);border-radius:8px;background:var(--sup);transition:border-color .12s}
input:focus,select:focus,textarea:focus{border-color:var(--marinho);outline:none;box-shadow:0 0 0 3px var(--marinho-cl)}
textarea{resize:vertical;min-height:76px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;background:var(--marinho);color:#fff;border-radius:8px;padding:10px 16px;font-weight:600;font-size:13px;transition:background .12s}
.btn:hover{background:var(--marinho-esc)}
.btn.full{width:100%;padding:12px}
.btn.sec{background:var(--sup);color:var(--tinta);border:1px solid var(--linha)}
.btn.sec:hover{background:var(--sup2)}
.btn.perigo{background:var(--vermelho)}
.btn.mini{padding:6px 10px;font-size:12px}
.erro{background:#FBEDEC;color:var(--vermelho);border:1px solid #F0CFCC;border-radius:8px;padding:9px 11px;font-size:12.5px;margin-top:14px;font-weight:500}

/* ---------- App ---------- */
#app{display:none}
header.topo{background:var(--marinho);color:#fff;position:sticky;top:0;z-index:40;
  box-shadow:inset 0 -3px 0 var(--dourado)}
.topo .linha1{display:flex;align-items:center;gap:16px;padding:11px 22px;max-width:1500px;margin:0 auto}
.topo .divisor{width:1px;height:20px;background:rgba(255,255,255,.22)}
.topo .cicloTag{font-family:var(--mono);font-size:11.5px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.18);padding:3px 9px;border-radius:99px;letter-spacing:.04em}
.topo .dir{margin-left:auto;display:flex;align-items:center;gap:12px}
.nuvem{font-size:11.5px;font-family:var(--mono);opacity:.85;display:flex;align-items:center;gap:6px}
.pt{width:7px;height:7px;border-radius:99px;background:var(--dourado)}
.pt.off{background:#7F8496}.pt.erro{background:#E07A6F}
.quem{text-align:right;line-height:1.25}
.quem b{font-size:12.5px;font-weight:600;display:block}
.quem span{font-size:11px;opacity:.7}
.sair{color:#fff;opacity:.8;font-size:12px;border:1px solid rgba(255,255,255,.25);border-radius:7px;padding:5px 10px}
.sair:hover{opacity:1;background:rgba(255,255,255,.1)}

nav.abas{display:flex;gap:2px;padding:0 22px;max-width:1500px;margin:0 auto;overflow-x:auto}
nav.abas button{color:rgba(255,255,255,.62);padding:9px 14px 11px;font-size:13px;font-weight:600;border-bottom:2.5px solid transparent;white-space:nowrap}
nav.abas button:hover{color:#fff}
nav.abas button.on{color:#fff;border-bottom-color:var(--dourado)}

.subabas{background:var(--sup);border-bottom:1px solid var(--linha);position:sticky;top:83px;z-index:30}
.subabas .in{display:flex;gap:4px;padding:8px 22px;max-width:1500px;margin:0 auto;overflow-x:auto}
.subabas button{padding:6px 12px;border-radius:99px;font-size:12.5px;font-weight:600;color:var(--tinta2);white-space:nowrap}
.subabas button:hover{background:var(--sup2)}
.subabas button.on{background:var(--marinho-cl);color:var(--marinho-esc)}

main{max-width:1500px;margin:0 auto;padding:22px}
.tituloTela{font-family:var(--disp);font-weight:800;font-size:23px;letter-spacing:-.02em;margin-bottom:2px;color:var(--marinho)}
.subtitulo{color:var(--tinta2);font-size:13px;margin-bottom:18px}
.painel{background:var(--sup);border:1px solid var(--linha);border-radius:var(--r);padding:18px;box-shadow:var(--sombra);margin-bottom:16px}
.painel h3{font-family:var(--disp);font-weight:700;font-size:15px;margin-bottom:2px;letter-spacing:-.01em;color:var(--marinho)}
.painel .dica{color:var(--tinta3);font-size:12px;margin-bottom:14px}
.grade{display:grid;gap:14px}
.g2{grid-template-columns:repeat(2,1fr)} .g3{grid-template-columns:repeat(3,1fr)}
.g4{grid-template-columns:repeat(4,1fr)} .g5{grid-template-columns:repeat(5,1fr)}
@media(max-width:1100px){.g4,.g5{grid-template-columns:repeat(2,1fr)}.g3{grid-template-columns:1fr}}
@media(max-width:720px){.g2,.g4,.g5{grid-template-columns:1fr}}

.kpi{background:var(--sup);border:1px solid var(--linha);border-radius:var(--r);padding:15px 16px}
.kpi .rot{font-size:11px;font-weight:600;color:var(--tinta3);text-transform:uppercase;letter-spacing:.07em}
.kpi .val{font-family:var(--mono);font-weight:600;font-size:27px;letter-spacing:-.03em;margin-top:6px;line-height:1;color:var(--marinho)}
.kpi .pe{font-size:11.5px;color:var(--tinta2);margin-top:5px}

table{width:100%;border-collapse:collapse}
th{text-align:left;font-size:11px;font-weight:700;color:var(--tinta3);text-transform:uppercase;letter-spacing:.06em;padding:8px 10px;border-bottom:1px solid var(--linha)}
td{padding:9px 10px;border-bottom:1px solid var(--linha2);font-size:13px;vertical-align:middle}
tbody tr:hover{background:var(--sup2)}
.num{font-family:var(--mono);text-align:right}
.vazio{text-align:center;color:var(--tinta3);padding:34px 10px;font-size:13px}

.tag{display:inline-block;font-size:11px;font-weight:700;padding:3px 9px;border-radius:99px;letter-spacing:.02em}
.t1{background:#FBEDEC;color:var(--c1)} .t2{background:#FAF1E4;color:var(--c2)}
.t3{background:#EDEFF7;color:var(--c3)} .t4{background:var(--marinho-cl);color:var(--c4)}
.t5{background:#FAF3DC;color:var(--c5)} .tn{background:var(--sup2);color:var(--tinta3)}
.tend{font-family:var(--mono);font-size:12px;font-weight:600}
.sobe{color:var(--dourado-esc)} .desce{color:var(--vermelho)} .igual{color:var(--tinta3)}

/* Régua de proficiência — elemento-assinatura */
.regua{position:relative;height:34px;border-radius:8px;overflow:hidden;display:flex;border:1px solid var(--linha)}
.regua .z{flex:1;display:grid;place-items:center;font-size:9.5px;font-weight:700;color:#fff;letter-spacing:.05em;text-transform:uppercase;opacity:.92}
.regua .z:nth-child(1){background:var(--c1);flex:0 0 19.8%}
.regua .z:nth-child(2){background:var(--c2);flex:0 0 25%}
.regua .z:nth-child(3){background:var(--c3);flex:0 0 20%}
.regua .z:nth-child(4){background:var(--c4);flex:0 0 17.5%}
.regua .z:nth-child(5){background:var(--c5);flex:1}
.marcador{position:absolute;top:-3px;bottom:-3px;width:3px;background:var(--tinta);box-shadow:0 0 0 2px #fff;border-radius:2px;transition:left .3s}
.reguaLeg{display:flex;justify-content:space-between;font-family:var(--mono);font-size:10px;color:var(--tinta3);margin-top:4px}

.notas{display:flex;gap:5px}
.notas button{width:34px;height:34px;border-radius:7px;border:1px solid var(--linha);background:var(--sup);font-family:var(--mono);font-weight:600;font-size:13px;color:var(--tinta2);transition:all .1s}
.notas button:hover{border-color:var(--marinho);color:var(--marinho)}
.notas button.on{background:var(--marinho);border-color:var(--marinho);color:#fff}
.notas button.on.n1{background:var(--c1);border-color:var(--c1)}
.notas button.on.n2{background:var(--c2);border-color:var(--c2)}
.linhaComp{display:grid;grid-template-columns:30px 1fr 200px;gap:12px;align-items:center;padding:10px 0;border-bottom:1px solid var(--linha2)}
.linhaComp .n{font-family:var(--mono);font-size:12px;color:var(--tinta3);font-weight:600}
.linhaComp .txt{font-size:13.2px}
.evid{margin-top:6px;font-size:12.5px;padding:7px 9px}
@media(max-width:800px){.linhaComp{grid-template-columns:26px 1fr;}.linhaComp .notas{grid-column:2}}

.barra{height:7px;background:var(--linha2);border-radius:99px;overflow:hidden}
.barra i{display:block;height:100%;background:var(--marinho);border-radius:99px}
.chip{display:inline-flex;align-items:center;gap:5px;background:var(--sup2);border:1px solid var(--linha);border-radius:99px;padding:3px 9px;font-size:11.5px;font-weight:600;color:var(--tinta2)}
.pilha{display:flex;flex-direction:column;gap:3px}
.pilha small{color:var(--tinta3);font-size:11.5px}
.barraAcoes{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:14px}
.barraAcoes .cresce{flex:1}
.aviso{background:#FBF4E0;border:1px solid #EBDCA8;color:#6E5511;border-radius:8px;padding:10px 12px;font-size:12.5px;margin-bottom:14px;
  border-left:3px solid var(--dourado)}
.ok{background:var(--marinho-cl);border-color:#C7CDE2;color:var(--marinho)}

/* Modal */
.fundo{position:fixed;inset:0;background:rgba(7,12,38,.55);z-index:60;display:none;align-items:flex-start;justify-content:center;padding:40px 16px;overflow:auto}
.fundo.on{display:flex}
.modal{background:var(--sup);border-radius:14px;width:100%;max-width:640px;box-shadow:0 40px 90px rgba(0,0,0,.3)}
.modal .cab{padding:18px 20px;border-bottom:1px solid var(--linha);display:flex;align-items:center}
.modal .cab h3{font-family:var(--disp);font-weight:700;font-size:17px;color:var(--marinho)}
.modal .cab button{margin-left:auto;color:var(--tinta3);font-size:20px;line-height:1}
.modal .corpo{padding:20px}
.modal .rod{padding:14px 20px;border-top:1px solid var(--linha);display:flex;gap:8px;justify-content:flex-end}

/* Impressão */
#imp{display:none}
@media print{
  body{background:#fff}
  #login,#app,.fundo{display:none!important}
  #imp{display:block!important;padding:0}
  .quebra{page-break-after:always}
  table{page-break-inside:auto} tr{page-break-inside:avoid}
  @page{margin:14mm}
}
#imp .doc{max-width:190mm;margin:0 auto;color:#000;font-size:11px}
#imp .cabDoc{border-bottom:2px solid var(--marinho);padding-bottom:8px;margin-bottom:14px;display:flex;align-items:flex-end;
  box-shadow:0 2px 0 var(--dourado)}
#imp .cabDoc img{height:11mm;width:auto;display:block;margin-bottom:4px}
#imp .cabDoc .m{font-size:9px;color:#444;letter-spacing:.02em}
#imp .cabDoc .t{font-family:var(--disp);font-weight:700;font-size:13px;margin-top:2px}
#imp .cabDoc .d{margin-left:auto;text-align:right;font-size:9.5px;color:#555;font-family:var(--mono)}
#imp h4{font-family:var(--disp);font-size:12px;margin:14px 0 5px;padding-bottom:3px;border-bottom:1px solid #ccc;text-transform:uppercase;letter-spacing:.05em;color:#0D153E}
#imp table{font-size:10px} #imp th,#imp td{padding:4px 6px;border-bottom:1px solid #ddd}
#imp .ass{display:flex;gap:26px;margin-top:34px}
#imp .ass div{flex:1;border-top:1px solid #000;padding-top:4px;font-size:9.5px;text-align:center}
</style>
</head>
<body>

<!-- ============ LOGIN ============ -->
<div id="login">
  <div class="cardLogin">
    <img class="logoLogin" id="logoLogin" alt="Contabilizare — sua contabilidade em boas mãos">
    <h1>Avaliação<br>de <span>Desempenho</span></h1>
    <p class="sub">Gestão por competências · ciclos trimestrais</p>
    <label for="lgUser">Usuário</label>
    <input id="lgUser" autocomplete="username" placeholder="seu.usuario">
    <label for="lgSenha">Senha</label>
    <input id="lgSenha" type="password" autocomplete="current-password" placeholder="••••••••">
    <div style="height:18px"></div>
    <button class="btn full" onclick="entrar()">Entrar</button>
    <div id="lgErro"></div>
    <p style="margin-top:18px;font-size:11.5px;color:var(--tinta3);line-height:1.5">
      Primeiro acesso do RH: <b style="font-family:var(--mono)">eloisa</b> / <b style="font-family:var(--mono)">rh2026</b>.
      Troque a senha e cadastre os demais em Configurações.
    </p>
  </div>
</div>

<!-- ============ APP ============ -->
<div id="app">
  <header class="topo">
    <div class="linha1">
      <img class="logoTopo" id="logoTopo" alt="Contabilizare">
      <div class="divisor"></div>
      <div style="font-size:13px;font-weight:600">Avaliação de Desempenho</div>
      <div class="cicloTag" id="tagCiclo">—</div>
      <div class="dir">
        <div class="nuvem" id="nuvemSt"><i class="pt off"></i><span>local</span></div>
        <div class="quem"><b id="quemNome">—</b><span id="quemCargo">—</span></div>
        <button class="sair" onclick="sair()">Sair</button>
      </div>
    </div>
    <nav class="abas" id="navAbas"></nav>
  </header>
  <div class="subabas"><div class="in" id="navSub"></div></div>
  <main id="tela"></main>
</div>

<div class="fundo" id="fundo"><div class="modal" id="modal"></div></div>
<div id="imp"></div>

function trimestreAtual(){ return Math.floor(new Date().getMonth()/3)+1; }

/* --- Regras de acesso (POL/POP/MAN + diretrizes da Contabilizare) --- */
function podeAvaliar(u,c){ return c.gestorId===u.id && c.ativo && !c.vaga; }
function verTudo(u){ return u.perfil==='rh' || u.perfil==='ceo'; }
function podeVer(u,c){
  if(verTudo(u)) return true;
  if(c.id===u.id) return true;
  if(u.perfil==='gestor')      return c.gestorId===u.id || (u.escopo||[]).includes(c.setor);
  if(u.perfil==='coordenador') return c.gestorId===u.id;
  return false;
}
function visiveis(u){ return db.usuarios.filter(c=>c.id!==u.id && podeVer(u,c)); }
function meusAvaliados(u){ return db.usuarios.filter(c=>podeAvaliar(u,c)); }
function pessoa(id){ return db.usuarios.find(x=>x.id===id) || {nome:'—',cargo:'—',setor:'—'}; }

/* ======================================================================
   3. CÁLCULOS AUTOMÁTICOS  (Anexo I do Formulário + POP item 8)
   ====================================================================== */
function mediaDim(a,d){ const n=(a.notas&&a.notas[d])||[]; const v=n.filter(x=>x>0);
  return v.length===10 ? v.reduce((s,x)=>s+x,0)/10 : null; }
function pontosDim(a,d){ const n=(a.notas&&a.notas[d])||[]; return n.reduce((s,x)=>s+(x||0),0); }
function completa(a){ return DIMS.every(d=>mediaDim(a,d)!==null); }
function preenchidas(a){ return DIMS.reduce((s,d)=>s+((a.notas&&a.notas[d])||[]).filter(x=>x>0).length,0); }
function notaFinal(a){ if(!completa(a)) return null;
  return DIMS.reduce((s,d)=>s+mediaDim(a,d)*DIM[d].peso,0); }
function pontuacao(a){ return DIMS.reduce((s,d)=>s+pontosDim(a,d),0); }
function aproveitamento(a){ return pontuacao(a)/200*100; }
function classificar(n){ if(n==null) return null;
  return CLASSES.find(c=>n>=c.min && n<=c.max+0.0049) || CLASSES[CLASSES.length-1]; }
function anterior(a){
  const lista = db.avaliacoes.filter(x=>x.colaboradorId===a.colaboradorId && x.status!=='rascunho' && completa(x)
    && (x.ano<a.ano || (x.ano===a.ano && x.ciclo<a.ciclo)));
  lista.sort((p,q)=> (q.ano-p.ano) || (q.ciclo-p.ciclo));
  return lista[0]||null;
}
function evolucao(a){
  const ant=anterior(a); const at=notaFinal(a); if(!ant||at==null) return null;
  const an=notaFinal(ant); if(an==null||an===0) return null;
  const pct=((at-an)/an)*100;
  return {anterior:an, atual:at, pct, tendencia: pct>0.5?'Evolução' : pct<-0.5?'Declínio' : 'Estabilidade',
          clsAnt:classificar(an), clsAt:classificar(at), cicloAnt:ant.ciclo, anoAnt:ant.ano};
}
function mediaAnual(cid,ano){
  const l=db.avaliacoes.filter(a=>a.colaboradorId===cid&&a.ano===ano&&completa(a)&&a.status!=='rascunho');
  if(!l.length) return null;
  return {media:l.reduce((s,a)=>s+notaFinal(a),0)/l.length, ciclos:l.length};
}
function exigePdi(a){
  const n=notaFinal(a); if(n!=null && n<3.00) return true;
  return DIMS.some(d=>((a.notas&&a.notas[d])||[]).some(x=>x===1||x===2));
}
function avaliacaoDe(cid,ano,ciclo){ return db.avaliacoes.find(a=>a.colaboradorId===cid&&a.ano===ano&&a.ciclo===ciclo); }
const num=(v,c=2)=> v==null?'—':Number(v).toLocaleString('pt-BR',{minimumFractionDigits:c,maximumFractionDigits:c});
const pct=(v)=> v==null?'—':num(v,1)+'%';
const dataBR=(s)=> s? new Date(s+(s.length<=10?'T12:00':'')).toLocaleDateString('pt-BR') : '—';
const hojeISO=()=> new Date().toISOString().slice(0,10);
const esc=(s)=> String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));

/* ======================================================================
   4. PERSISTÊNCIA — local + Supabase (dados compartilhados)
   ====================================================================== */
var CHAVE='ad_contabilizare_v1';
var db, eu=null, aba='painel', sub='', ctx={};
var tmPush=null, tmPoll=null;

function salvar(sincronizar=true){
  db.carimbo=Date.now();
  try{ localStorage.setItem(CHAVE, JSON.stringify(db)); }catch(e){ console.warn('local',e); }
  if(sincronizar) agendarPush();
}
function carregar(){
  try{ const j=localStorage.getItem(CHAVE); if(j){ db=JSON.parse(j); validar(); return; } }catch(e){}
  db=seed(); localStorage.setItem(CHAVE, JSON.stringify(db));
}
function validar(){
  const s=seed();
  db.config = Object.assign({}, s.config, db.config||{});
  db.config.nuvem = Object.assign({}, s.config.nuvem, db.config.nuvem||{});
  ['usuarios','avaliacoes','pdis'].forEach(k=>{ if(!Array.isArray(db[k])) db[k]=s[k]; });
  db.usuarios.forEach(u=>{ if(!u.escopo) u.escopo=[]; if(u.ativo===undefined) u.ativo=true; });
  db.seqUsuario = db.seqUsuario || Math.max(0,...db.usuarios.map(u=>u.id));
  db.seqAval = db.seqAval || Math.max(0,...db.avaliacoes.map(a=>a.id));
  db.seqPdi  = db.seqPdi  || Math.max(0,...db.pdis.map(p=>p.id));
}
function nuvemLigada(){ const n=db.config.nuvem; return !!(n.ligada && n.url && n.chave); }
function stNuvem(estado,texto){
  const el=document.getElementById('nuvemSt'); if(!el) return;
  el.innerHTML='<i class="pt '+estado+'"></i><span>'+texto+'</span>';
}
async function nuvemReq(metodo, sufixo, corpo){
  const n=db.config.nuvem;
  const r=await fetch(n.url.replace(/\/$/,'')+'/rest/v1/'+n.tabela+sufixo,{
    method:metodo,
    headers:{'apikey':n.chave,'Authorization':'Bearer '+n.chave,'Content-Type':'application/json',
             'Prefer':metodo==='POST'?'resolution=merge-duplicates,return=representation':'return=representation'},
    body: corpo?JSON.stringify(corpo):undefined
  });
  if(!r.ok) throw new Error(await r.text());
  const t=await r.text(); return t?JSON.parse(t):null;
}
function agendarPush(){
  if(!nuvemLigada()) { stNuvem('off','local'); return; }
  clearTimeout(tmPush); tmPush=setTimeout(push, 1500);
}
async function push(){
  if(!nuvemLigada()) return;
  try{
    stNuvem('off','enviando');
    await nuvemReq('POST','',[{id:'principal', dados:db, atualizado_em:new Date().toISOString()}]);
    stNuvem('','na nuvem');
  }catch(e){ console.warn('push',e); stNuvem('erro','erro de envio'); }
}
async function puxar(){
  if(!nuvemLigada()) return false;
  try{
    const r=await nuvemReq('GET','?id=eq.principal&select=dados');
    if(r && r[0] && r[0].dados){ mesclar(r[0].dados); return true; }
  }catch(e){ console.warn('pull',e); stNuvem('erro','sem conexão'); }
  return false;
}
/* União por registro: quem tem o carimbo mais novo vence — evita perder
   avaliações lançadas por dois gestores ao mesmo tempo. */
function mesclar(remoto){
  if(!remoto) return;
  const uni=(local,rem)=>{
    const mapa={}; (rem||[]).forEach(x=>mapa[x.id]=x);
    (local||[]).forEach(x=>{ const r=mapa[x.id];
      if(!r) mapa[x.id]=x;
      else if((x.atualizadoEm||0) >= (r.atualizadoEm||0)) mapa[x.id]=x; });
    return Object.values(mapa).sort((a,b)=>a.id-b.id);
  };
  db.usuarios  = uni(db.usuarios,  remoto.usuarios);
  db.avaliacoes= uni(db.avaliacoes,remoto.avaliacoes);
  db.pdis      = uni(db.pdis,      remoto.pdis);
  if((remoto.carimbo||0) > (db.carimbo||0)) db.config=Object.assign({},db.config,remoto.config,{nuvem:db.config.nuvem});
  db.seqUsuario=Math.max(db.seqUsuario||0, remoto.seqUsuario||0, ...db.usuarios.map(u=>u.id));
  db.seqAval   =Math.max(db.seqAval||0,    remoto.seqAval||0,    ...db.avaliacoes.map(a=>a.id),0);
  db.seqPdi    =Math.max(db.seqPdi||0,     remoto.seqPdi||0,     ...db.pdis.map(p=>p.id),0);
  localStorage.setItem(CHAVE, JSON.stringify(db));
}
function iniciarPoll(){
  clearInterval(tmPoll);
  if(!nuvemLigada()){ stNuvem('off','local'); return; }
  stNuvem('','na nuvem');
  tmPoll=setInterval(async()=>{ if(await puxar() && eu) render(); }, 10000);
}

function abasDe(u){
  const a=[['painel','Painel'],['avaliacoes','Avaliações'],['colaboradores','Colaboradores'],
           ['pdi','PDI'],['feedback','Feedback'],['relatorios','Relatórios']];
  if(u.perfil==='rh') a.push(['config','Configurações']);
  return a;
}
var SUBS={
  painel:[['geral','Visão geral'],['setor','Por setor'],['gestor','Por gestor'],
          ['dimensao','Por dimensão'],['competencia','Por competência'],['evolucao','Evolução']],
  avaliacoes:[['pendentes','A avaliar'],['andamento','Em andamento'],['concluidas','Concluídas'],['homologar','Homologação']],
  colaboradores:[['lista','Minha visão'],['ficha','Ficha individual']],
  pdi:[['abertos','Em andamento'],['concluidos','Concluídos'],['sugeridos','Exigidos pelo POP']],
  feedback:[['pendentes','Pendentes'],['registrados','Registrados']],
  relatorios:[['individual','Individual'],['setorial','Por setor'],['gerencial','Gerencial'],
              ['executivo','Executivo'],['rankings','Rankings']],
  config:[['usuarios','Usuários e acessos'],['ciclo','Ciclo avaliativo'],['nuvem','Nuvem e dados'],['metodologia','Metodologia']]
};
function subsDe(u,a){
  let l=(SUBS[a]||[]).slice();
  if(a==='avaliacoes' && u.perfil!=='rh') l=l.filter(x=>x[0]!=='homologar');
  if(a==='relatorios' && !verTudo(u)) l=l.filter(x=>x[0]!=='executivo');
  return l;
}
function irAba(a){ aba=a; sub=(subsDe(eu,a)[0]||[''])[0]; ctx={}; render(); }
function irSub(s){ sub=s; render(); }
function render(){
  document.getElementById('quemNome').textContent=eu.nome;
  document.getElementById('quemCargo').textContent=eu.cargo+' · '+rotuloPerfil(eu.perfil);
  document.getElementById('tagCiclo').textContent=db.config.ciclo+'º TRI / '+db.config.ano;
  document.getElementById('navAbas').innerHTML = abasDe(eu).map(([k,n])=>
    `<button class="${aba===k?'on':''}" onclick="irAba('${k}')">${n}</button>`).join('');
  const subs=subsDe(eu,aba);
  if(sub.charAt(0)!=='_' && !subs.find(s=>s[0]===sub)) sub=(subs[0]||[''])[0];
  document.getElementById('navSub').innerHTML = subs.map(([k,n])=>
    `<button class="${sub===k?'on':''}" onclick="irSub('${k}')">${n}</button>`).join('');
  const fn = TELAS[aba+'_'+sub] || TELAS[aba] || (()=>'<div class="vazio">Tela em branco.</div>');
  document.getElementById('tela').innerHTML = fn();
  if(typeof depois==='function' && depois._){ const f=depois._; depois._=null; f(); }
}
function depois(f){ depois._=f; }
function rotuloPerfil(p){ return {rh:'Recursos Humanos',ceo:'Diretoria',gestor:'Gestor',coordenador:'Coordenador',colaborador:'Colaborador'}[p]||p; }

function kpi(rot,val,pe){ return `<div class="kpi"><div class="rot">${rot}</div><div class="val">${val}</div>${pe?`<div class="pe">${pe}</div>`:''}</div>`; }

TELAS['painel_evolucao']=()=>{

    const n=av.map(notaFinal); return n.length?n.reduce((a,b)=>a+b,0)/n.length:null;
  });
  const anual=series.filter(x=>x!=null);
  grafico('gEvo',{type:'line',data:{labels:['1º TRI','2º TRI','3º TRI','4º TRI'],
    datasets:[{data:series,borderColor:'#0D153E',backgroundColor:'rgba(13,21,62,.09)',fill:true,tension:.3,
      pointRadius:5,pointBackgroundColor:'#0D153E',spanGaps:true}]},
    options:{scales:{y:{min:1,max:5,ticks:{stepSize:.5}}},plugins:{legend:{display:false}}}});
  const linhas=eleg.map(p=>{
    const cic=[1,2,3,4].map(c=>{const a=avaliacaoDe(p.id,ano,c); return a&&completa(a)&&a.status!=='rascunho'?notaFinal(a):null;});

    ${kpi('Evolução organizacional', anual.length>=2? num(((anual[anual.length-1]-anual[0])/anual[0])*100,2)+'%':'—','Do 1º ciclo apurado ao último')}

    <div style="height:250px"><canvas id="gEvo"></canvas></div></div>
  <div class="painel"><h3>Evolução individual</h3><p class="dica">Notas finais por ciclo e média anual</p>

      <th class="num">Média anual</th><th>Tendência</th></tr></thead><tbody>
    ${linhas.length?linhas.map(l=>`<tr>
      <td><b>${esc(l.p.nome)}</b></td><td>${esc(l.p.setor)}</td>
      ${l.cic.map(v=>`<td class="num">${v==null?'—':num(v)}</td>`).join('')}
      <td class="num"><b>${num(l.ma)}</b></td>
      <td>${l.ev==null?'<span class="tend igual">—</span>':`<span class="tend ${l.ev>0.5?'sobe':l.ev<-0.5?'desce':'igual'}">${l.ev>0.5?'▲':l.ev<-0.5?'▼':'●'} ${num(l.ev,2)}%</span>`}</td>

function listaAvals(filtro){
  const {ano,ciclo}=db.config;
  const meus=meusAvaliados(eu);
  return meus.map(c=>{
    const a=avaliacaoDe(c.id,ano,ciclo);
    return {c,a};
  }).filter(filtro);
}
function cartaoLinha(c,a){
  const n=a?notaFinal(a):null; const e=a?evolucao(a):null;
  const st = !a?'Não iniciada' : a.status==='rascunho'?'Em andamento' : a.status==='concluida'?'Aguardando RH':'Homologada';
  const stc = !a?'tn' : a.status==='rascunho'?'t2' : a.status==='concluida'?'t3':'t4';
  return `<tr>
    <td><div class="pilha"><b>${esc(c.nome)}</b><small>${esc(c.cargo)} · ${esc(c.setor)}</small></div></td>
    <td><span class="tag ${stc}">${st}</span></td>
    <td class="num">${a?preenchidas(a)+'/40':'—'}</td>
    <td class="num">${num(n)}</td>
    <td>${tagCls(classificar(n))}</td>
    <td>${tend(e)}</td>
    <td style="text-align:right;white-space:nowrap">
      <button class="btn mini" onclick="abrirAval(${c.id})">${a&&a.status!=='rascunho'?'Ver':'Avaliar'}</button>
      ${a&&completa(a)?`<button class="btn sec mini" onclick="imprimirIndividual(${a.id})">Imprimir</button>`:''}
    </td></tr>`;
}
function tabelaAvals(linhas,vazio){
  return `<table><thead><tr><th>Colaborador</th><th>Situação</th><th class="num">Preenchido</th>
    <th class="num">Nota final</th><th>Classificação</th><th>Evolução</th><th></th></tr></thead><tbody>

}

/* --- Formulário de avaliação --- */
function novaAval(cid){
  db.seqAval++;
  const a={id:db.seqAval, colaboradorId:cid, avaliadorId:eu.id, ano:db.config.ano, ciclo:db.config.ciclo,
    data:hojeISO(), notas:{}, evidencias:{}, pontosFortes:'', oportunidades:'', observacoes:'',
    status:'rascunho', dataHomologacao:'', homologadoPor:null,
    feedback:{realizado:false, data:'', registro:'', metas:''}, atualizadoEm:Date.now()};
  DIMS.forEach(d=>{ a.notas[d]=Array(10).fill(0); a.evidencias[d]=Array(10).fill(''); });
  db.avaliacoes.push(a); return a;
}
function abrirAval(cid){
  const c=pessoa(cid);
  if(!podeVer(eu,c) && !podeAvaliar(eu,c)){
    alerta('Sem acesso','Você não tem acesso às informações de '+esc(c.nome)+'. O acesso segue a hierarquia de avaliação da Contabilizare.');
    return;
  }
  let a=avaliacaoDe(cid,db.config.ano,db.config.ciclo);
  const soLeitura = !podeAvaliar(eu,c) || (a && a.status==='homologada' && eu.perfil!=='rh');
  if(!a){ if(!podeAvaliar(eu,c)){ alerta('Sem avaliação','Ainda não existe avaliação de '+esc(c.nome)+' neste ciclo. Quem avalia é '+esc(pessoa(c.gestorId).nome)+'.'); return; } a=novaAval(cid); salvar(); }
  ctx.aval=a.id; ctx.leitura=soLeitura; ctx.dimAberta=ctx.dimAberta||'org';
  aba='avaliacoes'; sub='_form'; render();
}

function setNota(d,i,v){

function setEvid(d,i,v){ const a=db.avaliacoes.find(x=>x.id===ctx.aval); a.evidencias[d][i]=v; a.atualizadoEm=Date.now(); salvar(); }

function concluirAval(id){
  const a=db.avaliacoes.find(x=>x.id===id);

  a.status='concluida'; a.data=hojeISO(); a.atualizadoEm=Date.now(); salvar();

}
function homologar(id){

}
function devolver(id){
  const a=db.avaliacoes.find(x=>x.id===id);

  render();
}

function abrirPdi(avalId){
  const a=db.avaliacoes.find(x=>x.id===avalId);
  let p=db.pdis.find(x=>x.avaliacaoId===avalId);
  if(!p){ db.seqPdi++; p={id:db.seqPdi, avaliacaoId:avalId, colaboradorId:a.colaboradorId, ano:a.ano, ciclo:a.ciclo,
    itens:[], status:'andamento', criadoEm:hojeISO(), atualizadoEm:Date.now()}; db.pdis.push(p); salvar(); }
  ctx.pdi=p.id; formPdi();
}

  const p=db.pdis.find(x=>x.id===ctx.pdi); const c=pessoa(p.colaboradorId);
  const a=db.avaliacoes.find(x=>x.id===p.avaliacaoId);
  const fracas=[]; if(a) DIMS.forEach(d=>DIM[d].itens.forEach((t,i)=>{ const n=a.notas[d][i]; if(n===1||n===2) fracas.push(DIM[d].curto+' '+String(i+1).padStart(2,'0')+' — '+t); }));

    ${fracas.length?`<div class="aviso"><b>Competências com nota 1 ou 2 nesta avaliação:</b><br>${fracas.map(f=>'· '+esc(f)).join('<br>')}</div>`:''}
    ${p.itens.map((it,i)=>`<div style="border:1px solid var(--linha);border-radius:9px;padding:12px;margin-bottom:10px">
      <div style="display:flex;align-items:center;margin-bottom:8px"><b style="font-family:var(--mono);font-size:12px">AÇÃO ${String(i+1).padStart(2,'0')}</b>

        <div><label>Objetivo</label><input value="${esc(it.objetivo)}" onchange="setPdi(${i},'objetivo',this.value)"></div>
      </div>
      <label>Ação de desenvolvimento</label><input value="${esc(it.acao)}" onchange="setPdi(${i},'acao',this.value)">

          ${['Não iniciada','Em andamento','Concluída'].map(s=>`<option ${it.status===s?'selected':''}>${s}</option>`).join('')}
        </select></div>

        <div><label>Data da revisão</label><input type="date" value="${esc(it.revisao)}" onchange="setPdi(${i},'revisao',this.value)"></div>

     <button class="btn" onclick="concluirPdi()">${p.status==='concluido'?'Reabrir PDI':'Marcar PDI como concluído'}</button>`);

function mostrarEscopo(){ document.getElementById('boxEscopo').style.display =
  document.getElementById('uPerfil').value==='gestor'?'block':'none'; }
function salvarUsuario(){
  const id=ctx.usr;
  const dados={
    nome:document.getElementById('uNome').value.trim(),
    cargo:document.getElementById('uCargo').value.trim(),
    setor:document.getElementById('uSetor').value.trim(),
    perfil:document.getElementById('uPerfil').value,
    gestorId:document.getElementById('uGestor').value?+document.getElementById('uGestor').value:null,
    admissao:document.getElementById('uAdm').value,
    login:document.getElementById('uLogin').value.trim().toLowerCase(),
    ativo:document.getElementById('uAtivo').value==='1',
    escopo:[...document.querySelectorAll('.escSet:checked')].map(c=>c.value)
  };
  if(!dados.nome){ alerta('Falta o nome','Informe o nome do colaborador para salvar.'); return; }
  if(dados.login && db.usuarios.some(u=>u.id!==id && (u.login||'').toLowerCase()===dados.login)){
    alerta('Login em uso','Já existe outro usuário com esse login. Escolha outro.'); return; }
  if(id){ Object.assign(pessoa(id), dados, {atualizadoEm:Date.now()}); }
  else { db.seqUsuario++; db.usuarios.push(Object.assign({id:db.seqUsuario, senha:'', vaga:false, atualizadoEm:Date.now()}, dados)); }
  salvar(); fecharModal(); render();
}
function resetSenha(id){
  const u=pessoa(id); ctx.usr=id;
  abrirModal('Senha de '+esc(u.nome),
    `<p style="font-size:13px;color:var(--tinta2);margin-bottom:12px">Login: <b style="font-family:var(--mono)">${esc(u.login)||'— sem login'}</b></p>

        Oriente a pessoa a trocá-la no primeiro acesso, em Configurações.</p>`
      :'<div class="aviso">Esta pessoa não tem login cadastrado. Edite o usuário e defina um login antes de criar a senha.</div>'}`,
    u.login?`<button class="btn sec" onclick="fecharModal()">Cancelar</button>
      <button class="btn perigo" onclick="tirarSenha()">Remover acesso</button>
      <button class="btn" onclick="gravarSenha()">Salvar senha</button>`

function gravarSenha(){
  const s=document.getElementById('sNova').value;

function tirarSenha(){ const u=pessoa(ctx.usr); u.senha=''; u.atualizadoEm=Date.now(); salvar(); fecharModal(); render(); }

function salvarNuvem(){
  db.config.nuvem={url:document.getElementById('nUrl').value.trim(), chave:document.getElementById('nChave').value.trim(),
    tabela:document.getElementById('nTab').value.trim()||'avaliacao_desempenho', ligada:document.getElementById('nLig').value==='1'};
  salvar(false); localStorage.setItem(CHAVE, JSON.stringify(db));
  iniciarPoll(); push(); alerta('Conexão salva','Se os dados estiverem certos, o indicador no topo vai mostrar "na nuvem".'); render();
}
async function testarNuvem(){
  try{ await nuvemReq('GET','?select=id&limit=1'); alerta('Conexão funcionando','O Supabase respondeu. Pode ligar a sincronização.'); }
  catch(e){ alerta('Não conectou','O Supabase recusou a chamada.<br><br><span style="font-family:var(--mono);font-size:11px">'+esc(String(e.message).slice(0,300))+'</span>'); }
}
function baixarBackup(){
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([JSON.stringify(db,null,2)],{type:'application/json'}));
  a.download='avaliacao-desempenho-'+hojeISO()+'.json'; a.click();
}
function restaurarBackup(inp){
  const f=inp.files[0]; if(!f) return;
  const r=new FileReader();
  r.onload=()=>{ try{ const d=JSON.parse(r.result); if(!d.usuarios) throw 0;
    db=d; validar(); salvar(); alerta('Cópia restaurada','Os dados do arquivo substituíram o que estava aqui.'); render();
  }catch(e){ alerta('Arquivo inválido','Este arquivo não é uma cópia do sistema.'); } };
  r.readAsText(f);
}
